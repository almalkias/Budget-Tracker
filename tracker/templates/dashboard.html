<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مراقب الميزانية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f172a;
      --card:      #1e293b;
      --border:    #334155;
      --accent:    #38bdf8;
      --text:      #f1f5f9;
      --muted:     #94a3b8;
      --green:     #22c55e;
      --yellow:    #eab308;
      --red:       #ef4444;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1rem;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .75rem;
      margin-bottom: 1.5rem;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .header-meta { font-size: .85rem; color: var(--muted); text-align: left; }

    /* ── Month picker ────────────────────────────────────────── */
    .month-picker {
      display: flex;
      align-items: center;
      gap: .5rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: .75rem;
      padding: .5rem .9rem;
    }
    .month-picker select, .month-picker button {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'Tajawal', sans-serif;
      font-size: .95rem;
      cursor: pointer;
      outline: none;
    }
    .month-picker select option { background: var(--card); }
    .month-picker button {
      background: var(--accent);
      color: #0f172a;
      border-radius: .5rem;
      padding: .25rem .75rem;
      font-weight: 700;
    }
    .month-picker button:hover { opacity: .85; }

    /* ── Summary cards ───────────────────────────────────────── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.2rem 1.4rem;
    }
    .card .label { font-size: .8rem; color: var(--muted); margin-bottom: .4rem; }
    .card .value { font-size: 1.6rem; font-weight: 700; }
    .card .value.spent  { color: var(--red); }
    .card .value.income { color: var(--green); }
    .card .value.bal    { color: var(--accent); }
    .card .value.count  { color: var(--yellow); }

    /* ── Chart section ───────────────────────────────────────── */
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: .75rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .chart-wrap { margin-bottom: 1.75rem; }
    .bar-row {
      display: grid;
      grid-template-columns: 110px 1fr 80px;
      align-items: center;
      gap: .75rem;
      margin-bottom: .6rem;
    }
    .bar-label { font-size: .85rem; color: var(--text); white-space: nowrap; }
    .bar-track {
      background: var(--border);
      border-radius: 99px;
      height: 10px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .5s ease;
    }
    .bar-fill.green  { background: var(--green); }
    .bar-fill.yellow { background: var(--yellow); }
    .bar-fill.red    { background: var(--red); }
    .bar-amount { font-size: .85rem; color: var(--muted); text-align: left; }

    /* ── Table ───────────────────────────────────────────────── */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    thead th {
      background: #0f172a;
      padding: .75rem 1rem;
      text-align: right;
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
    }
    tbody tr { border-top: 1px solid var(--border); }
    tbody tr:hover { background: rgba(56,189,248,.04); }
    tbody td { padding: .7rem 1rem; white-space: nowrap; }
    .badge {
      display: inline-block;
      padding: .15rem .6rem;
      border-radius: .4rem;
      font-size: .78rem;
      font-weight: 500;
    }
    .type-debit  { color: var(--red); }
    .type-credit { color: var(--green); }

    /* badge colours per category */
    .cat-food       { background:#7f1d1d33; color:#fca5a5; }
    .cat-fuel       { background:#78350f33; color:#fcd34d; }
    .cat-pharmacy   { background:#14532d33; color:#86efac; }
    .cat-shopping   { background:#1e1b4b33; color:#a5b4fc; }
    .cat-bills      { background:#0c4a6e33; color:#7dd3fc; }
    .cat-family     { background:#4a1d9633; color:#c4b5fd; }
    .cat-bnpl       { background:#83184333; color:#f9a8d4; }
    .cat-investment { background:#14532d33; color:#6ee7b7; }
    .cat-salary     { background:#064e3b33; color:#34d399; }
    .cat-other      { background:#1e293b;   color:#94a3b8; }

    /* ── Loader ──────────────────────────────────────────────── */
    #loader {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-size: 1.1rem;
    }
    #error-msg {
      display: none;
      background: #7f1d1d44;
      border: 1px solid var(--red);
      color: #fca5a5;
      border-radius: .75rem;
      padding: .75rem 1rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 480px) {
      .bar-row { grid-template-columns: 90px 1fr 60px; }
      .card .value { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>مراقب الميزانية</h1>
      <div class="header-meta">
        <span id="header-month"></span>
        &nbsp;|&nbsp;
        آخر تحديث: <span id="last-update">—</span>
      </div>
    </div>
    <div class="month-picker">
      <select id="sel-month">
        <option value="1">يناير</option><option value="2">فبراير</option>
        <option value="3">مارس</option><option value="4">أبريل</option>
        <option value="5">مايو</option><option value="6">يونيو</option>
        <option value="7">يوليو</option><option value="8">أغسطس</option>
        <option value="9">سبتمبر</option><option value="10">أكتوبر</option>
        <option value="11">نوفمبر</option><option value="12">ديسمبر</option>
      </select>
      <select id="sel-year"></select>
      <button onclick="loadData()">عرض</button>
    </div>
  </header>

  <div id="error-msg"></div>
  <div id="loader">جاري التحميل…</div>
  <div id="content" style="display:none">

    <!-- Summary cards -->
    <div class="cards">
      <div class="card">
        <div class="label">إجمالي المصروف</div>
        <div class="value spent" id="total-spent">—</div>
      </div>
      <div class="card">
        <div class="label">إجمالي الدخل</div>
        <div class="value income" id="total-income">—</div>
      </div>
      <div class="card">
        <div class="label">الرصيد الحالي</div>
        <div class="value bal" id="balance">—</div>
      </div>
      <div class="card">
        <div class="label">عدد العمليات</div>
        <div class="value count" id="tx-count">—</div>
      </div>
    </div>

    <!-- Bar chart -->
    <div class="chart-wrap">
      <div class="section-title">المصروف حسب الفئة</div>
      <div id="chart"></div>
    </div>

    <!-- Recent transactions -->
    <div class="section-title">آخر العمليات</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>التاريخ</th>
            <th>التاجر / الوصف</th>
            <th>الفئة</th>
            <th>النوع</th>
            <th>المبلغ</th>
            <th>الرصيد</th>
          </tr>
        </thead>
        <tbody id="tx-body"></tbody>
      </table>
    </div>

  </div>

  <script>
    // ── Config ────────────────────────────────────────────────
    const LIMITS = {
      food: 800, fuel: 300, pharmacy: 250, shopping: 500,
      bills: 2000, family: 1000, bnpl: 400,
      investment: 0, salary: 0, other: 300,
    };
    const CAT_LABELS = {
      food:'مطاعم وتوصيل', fuel:'وقود', pharmacy:'صيدليات',
      shopping:'تسوق', bills:'فواتير وسداد', family:'تحويلات الأهل',
      bnpl:'تقسيط', investment:'استثمار', salary:'راتب وارد', other:'متنوع',
    };
    const MONTHS_AR = [
      '','يناير','فبراير','مارس','أبريل','مايو','يونيو',
      'يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'
    ];

    // ── Init selectors ────────────────────────────────────────
    const now = new Date();
    let currentMonth = now.getMonth() + 1;
    let currentYear  = now.getFullYear();

    const selMonth = document.getElementById('sel-month');
    const selYear  = document.getElementById('sel-year');

    selMonth.value = currentMonth;
    for (let y = currentYear; y >= currentYear - 3; y--) {
      const o = document.createElement('option');
      o.value = y; o.textContent = y;
      selYear.appendChild(o);
    }
    selYear.value = currentYear;

    // ── Helpers ───────────────────────────────────────────────
    const fmt = n => Number(n).toLocaleString('ar-SA', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' ر.س';

    function barColor(pct) {
      if (pct >= 100) return 'red';
      if (pct >= 75)  return 'yellow';
      return 'green';
    }

    // ── Render ────────────────────────────────────────────────
    function render(data) {
      // header
      document.getElementById('header-month').textContent =
        `${MONTHS_AR[data.month]} ${data.year}`;
      document.getElementById('last-update').textContent =
        new Date().toLocaleTimeString('ar-SA');

      // summary cards
      document.getElementById('total-spent').textContent  = fmt(data.total_spent);
      document.getElementById('total-income').textContent = fmt(data.total_income);
      document.getElementById('balance').textContent      = fmt(data.balance_latest);
      document.getElementById('tx-count').textContent     = data.recent.length;

      // bar chart
      const chart = document.getElementById('chart');
      chart.innerHTML = '';
      if (data.by_category.length === 0) {
        chart.innerHTML = '<p style="color:var(--muted);font-size:.9rem">لا توجد مصروفات هذا الشهر</p>';
      } else {
        data.by_category.forEach(row => {
          if (!['debit',''].includes('')) {} // always show
          const limit = LIMITS[row.category] || 300;
          const pct   = limit > 0 ? Math.min((row.total / limit) * 100, 100) : 0;
          const color = barColor(limit > 0 ? (row.total / limit) * 100 : 0);
          const label = CAT_LABELS[row.category] || row.category;
          chart.innerHTML += `
            <div class="bar-row">
              <div class="bar-label">${label}</div>
              <div class="bar-track">
                <div class="bar-fill ${color}" style="width:${pct}%"></div>
              </div>
              <div class="bar-amount">${fmt(row.total)}</div>
            </div>`;
        });
      }

      // table
      const tbody = document.getElementById('tx-body');
      tbody.innerHTML = '';
      if (data.recent.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:2rem">لا توجد عمليات</td></tr>`;
      } else {
        data.recent.forEach(t => {
          const catLabel = CAT_LABELS[t.category] || t.category;
          const typeLabel = t.type === 'debit' ? 'خصم' : 'إيداع';
          const typeClass = t.type === 'debit' ? 'type-debit' : 'type-credit';
          const sign      = t.type === 'debit' ? '−' : '+';
          tbody.innerHTML += `
            <tr>
              <td style="color:var(--muted)">${t.created_at}</td>
              <td>${t.merchant || '—'}</td>
              <td><span class="badge cat-${t.category}">${catLabel}</span></td>
              <td class="${typeClass}">${typeLabel}</td>
              <td style="font-weight:700;color:${t.type==='debit'?'var(--red)':'var(--green)'}">${sign} ${fmt(t.amount)}</td>
              <td style="color:var(--muted)">${t.balance != null ? fmt(t.balance) : '—'}</td>
            </tr>`;
        });
      }

      document.getElementById('loader').style.display  = 'none';
      document.getElementById('content').style.display = 'block';
    }

    // ── Fetch ─────────────────────────────────────────────────
    function loadData() {
      const month = selMonth.value;
      const year  = selYear.value;
      currentMonth = +month;
      currentYear  = +year;

      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      fetch(`/api/dashboard/?month=${month}&year=${year}`)
        .then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.json();
        })
        .then(render)
        .catch(err => {
          errEl.textContent = `خطأ في تحميل البيانات: ${err.message}`;
          errEl.style.display = 'block';
          document.getElementById('loader').style.display = 'none';
        });
    }

    // ── Auto-refresh every 30s ─────────────────────────────────
    loadData();
    setInterval(loadData, 30000);
  </script>
</body>
</html>
