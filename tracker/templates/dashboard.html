<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مراقب الميزانية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F5F4EF;
      --card:      #FFFFFF;
      --border:    #E8E7E2;
      --accent:    #D97757;
      --accent-dk: #C4623E;
      --text:      #1A1A18;
      --muted:     #7A7A72;
      --green:     #2E7D52;
      --green-bg:  #EBF5EF;
      --yellow:    #A0720A;
      --yellow-bg: #FEF9EC;
      --red:       #C0392B;
      --red-bg:    #FDECEA;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.25rem 1rem;
    }

    /* ── Header ──────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .75rem;
      margin-bottom: 1.75rem;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .header-meta { font-size: .85rem; color: var(--muted); text-align: left; }

    /* ── Section titles ───────────────────────────────────────── */
    .section-title {
      font-size: .8rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: .75rem;
      text-transform: uppercase;
      letter-spacing: .07em;
    }

    /* ── Pending section ──────────────────────────────────────── */
    #pending-section { margin-bottom: 1.75rem; }
    .pending-badge {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      border-radius: 99px;
      font-size: .7rem;
      font-weight: 700;
      padding: .1rem .45rem;
      margin-right: .4rem;
      vertical-align: middle;
    }
    .pending-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1rem 1.2rem;
      margin-bottom: .75rem;
      transition: opacity .3s, transform .3s;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .pending-card.hiding { opacity: 0; transform: translateY(-8px); pointer-events: none; }
    .pending-card-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: .4rem;
    }
    .pending-meta   { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: .5rem; }
    .pending-amount { font-size: 1.15rem; font-weight: 700; }
    .pending-date   { font-size: .8rem; color: var(--muted); }
    .pending-raw {
      font-family: 'Tajawal', sans-serif;
      font-size: .78rem;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: .4rem;
      padding: .5rem .75rem;
      margin-bottom: .75rem;
      white-space: pre-wrap;
      word-break: break-word;
      direction: rtl;
      text-align: right;
      line-height: 1.5;
    }
    .cat-buttons { display: flex; flex-wrap: wrap; gap: .4rem; }
    .btn-skip {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: .5rem;
      padding: .25rem .75rem;
      font-family: 'Tajawal', sans-serif;
      font-size: .82rem;
      cursor: pointer;
      margin-top: .5rem;
      transition: color .15s, border-color .15s;
    }
    .btn-skip:hover { color: var(--yellow); border-color: var(--yellow); }
    .cat-btn {
      background: #F5F4EF;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: .5rem;
      padding: .3rem .65rem;
      font-family: 'Tajawal', sans-serif;
      font-size: .82rem;
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
      white-space: nowrap;
    }
    .cat-btn:hover  { background: var(--accent); border-color: var(--accent); color: #fff; }
    .cat-btn:active { background: var(--accent-dk); border-color: var(--accent-dk); color: #fff; }

    /* ── Cycle setup panel ────────────────────────────────────── */
    .setup-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.4rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .setup-fields { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem; }
    .setup-field  { display: flex; flex-direction: column; gap: .35rem; flex: 1; min-width: 160px; }
    .setup-field label { font-size: .85rem; color: var(--muted); }
    .setup-field input, .setup-field select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: .5rem;
      color: var(--text);
      font-family: 'Tajawal', sans-serif;
      font-size: 1rem;
      padding: .45rem .75rem;
      outline: none;
      width: 100%;
    }
    .setup-field input:focus, .setup-field select:focus { border-color: var(--accent); }
    .setup-field select option { background: var(--card); }
    .setup-month-row { display: flex; gap: .5rem; }
    .setup-month-row select { flex: 1; }

    /* ── Cycle active section ─────────────────────────────────── */
    #cycle-active { margin-bottom: 1.5rem; }
    .cycle-controls {
      display: flex;
      align-items: center;
      gap: .75rem;
      flex-wrap: wrap;
      margin-top: .75rem;
    }
    .btn {
      border: none;
      border-radius: .5rem;
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      padding: .4rem 1rem;
      transition: opacity .15s;
    }
    .btn:hover   { opacity: .85; }
    .btn:active  { opacity: .7; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost   { background: var(--card); border: 1px solid var(--border); color: var(--text); }
    .btn-danger  { background: var(--red-bg); border: 1px solid #F1C0BB; color: var(--red); }

    .edit-balance-panel {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: .75rem;
      padding: .9rem 1.1rem;
      margin-top: .75rem;
      display: none;
      align-items: center;
      gap: .75rem;
      flex-wrap: wrap;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .edit-balance-panel input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: .5rem;
      color: var(--text);
      font-family: 'Tajawal', sans-serif;
      font-size: 1rem;
      padding: .4rem .75rem;
      outline: none;
      width: 160px;
    }
    .edit-balance-panel input:focus { border-color: var(--accent); }

    /* ── Delete button ────────────────────────────────────────── */
    .btn-delete {
      background: none;
      border: none;
      color: #BBBBB3;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: .2rem .4rem;
      border-radius: .3rem;
      transition: color .15s, background .15s;
    }
    .btn-delete:hover { color: var(--red); background: var(--red-bg); }
    tr.removing { opacity: 0; transition: opacity .25s ease; }

    /* ── Summary cards ────────────────────────────────────────── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: .5rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.2rem 1.4rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .card .label { font-size: .8rem; color: var(--muted); margin-bottom: .4rem; }
    .card .value { font-size: 1.6rem; font-weight: 700; }
    .card .value.remaining  { color: var(--accent); }
    .card .value.spent      { color: var(--red); }
    .card .value.count      { color: var(--text); }
    .card .value.pct-green  { color: var(--green); }
    .card .value.pct-yellow { color: var(--yellow); }

    /* ── Bar chart ────────────────────────────────────────────── */
    .chart-wrap { margin-bottom: 1.75rem; }
    .bar-row {
      display: grid;
      grid-template-columns: 130px 1fr 90px;
      align-items: center;
      gap: .75rem;
      margin-bottom: .6rem;
    }
    .bar-label  { font-size: .85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track  { background: var(--border); border-radius: 99px; height: 10px; overflow: hidden; }
    .bar-fill   { height: 100%; border-radius: 99px; transition: width .5s ease; background: var(--green); }
    .bar-fill.yellow { background: #E5A820; }
    .bar-fill.red    { background: var(--red); }
    .bar-amount { font-size: .85rem; color: var(--muted); text-align: left; }

    /* ── Table ────────────────────────────────────────────────── */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      overflow-x: auto;
      margin-bottom: 2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    thead th {
      background: var(--bg);
      padding: .75rem 1rem;
      text-align: right;
      color: var(--muted);
      font-weight: 600;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-top: 1px solid var(--border); }
    tbody tr:hover { background: #FAFAF7; }
    tbody td { padding: .7rem 1rem; white-space: nowrap; }
    .badge { display: inline-block; padding: .15rem .6rem; border-radius: .4rem; font-size: .78rem; font-weight: 500; }
    .type-debit  { color: var(--red); }
    .type-credit { color: var(--green); }

    .cat-supermarket  { background:#D1FAE5; color:#065F46; }
    .cat-clothes      { background:#EDE9FE; color:#4C1D95; }
    .cat-car          { background:#FEF3C7; color:#78350F; }
    .cat-food         { background:#FFE4E6; color:#9F1239; }
    .cat-pharmacy     { background:#DCFCE7; color:#14532D; }
    .cat-bnpl         { background:#FCE7F3; color:#831843; }
    .cat-cash         { background:#F5F5F4; color:#44403C; }
    .cat-family       { background:#E0E7FF; color:#1E1B4B; }
    .cat-reserve      { background:#E0F2FE; color:#0C4A6E; }
    .cat-visa         { background:#D1FAE5; color:#064E3B; }
    .cat-maids        { background:#FFF7ED; color:#9A3412; }
    .cat-school       { background:#EFF6FF; color:#1E40AF; }
    .cat-laundry      { background:#F0FDF4; color:#166534; }
    .cat-maintenance  { background:#FDF4FF; color:#6B21A8; }

    /* ── Cycle history ────────────────────────────────────────── */
    #cycle-history-section { margin-top: .5rem; }
    .history-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .5rem 1.5rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: .75rem;
      padding: .85rem 1.1rem;
      margin-bottom: .6rem;
      font-size: .9rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .history-month { font-weight: 700; color: var(--text); min-width: 100px; }
    .history-stats { display: flex; gap: 1.25rem; flex-wrap: wrap; align-items: center; }
    .history-stats span { color: var(--muted); }
    .history-stats .neg { color: var(--red); }
    .history-stats .pos { color: var(--green); }
    .history-row { cursor: pointer; user-select: none; transition: border-color .15s; }
    .history-row:hover { border-color: var(--accent); }
    .expand-icon { color: var(--muted); font-size: .85rem; transition: transform .2s; display: inline-block; margin-right: auto; }
    .history-item { margin-bottom: .6rem; }
    .history-item .history-row { margin-bottom: 0; border-radius: .75rem; }
    .history-item .history-row.open { border-radius: .75rem .75rem 0 0; border-bottom-color: transparent; }
    .cycle-breakdown {
      background: var(--bg);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 .75rem .75rem;
      padding: .6rem 1.1rem;
    }
    .breakdown-row {
      display: flex;
      justify-content: space-between;
      padding: .35rem 0;
      font-size: .85rem;
      border-bottom: 1px solid var(--border);
    }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-cat    { color: var(--text); }
    .breakdown-amount { color: var(--muted); }

    /* ── Loader / error ───────────────────────────────────────── */
    #loader { text-align: center; padding: 3rem; color: var(--muted); font-size: 1.1rem; }
    #error-msg {
      display: none;
      background: var(--red-bg);
      border: 1px solid #F1C0BB;
      color: var(--red);
      border-radius: .75rem;
      padding: .75rem 1rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 480px) {
      .bar-row { grid-template-columns: 100px 1fr 70px; }
      .card .value { font-size: 1.3rem; }
      .cat-btn { font-size: .78rem; padding: .25rem .5rem; }
      .history-stats { gap: .75rem; }
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>مراقب الميزانية</h1>
      <div class="header-meta">
        آخر تحديث: <span id="last-update">—</span>
      </div>
    </div>
    <form method="post" action="/logout/" style="margin:0">
      {% csrf_token %}
      <button type="submit" class="btn btn-ghost" style="font-size:.85rem;padding:.35rem .9rem">خروج</button>
    </form>
  </header>

  <div id="error-msg"></div>
  <div id="loader">جاري التحميل…</div>
  <div id="content" style="display:none">

    <!-- ── Pending categorization ──────────────────────────────── -->
    <div id="pending-section" style="display:none">
      <div class="section-title">
        <span class="pending-badge" id="pending-badge">0</span>
        بانتظار التصنيف
      </div>
      <div id="pending-list"></div>
    </div>

    <!-- ── Cycle: setup panel (no active cycle) ───────────────── -->
    <div id="cycle-setup" style="display:none">
      <div class="section-title">ابدأ دورة الميزانية</div>
      <div class="setup-card">
        <div class="setup-fields">
          <div class="setup-field">
            <label>الراتب (ر.س)</label>
            <input type="number" id="setup-balance" min="1" step="0.01" />
          </div>
          <div class="setup-field">
            <label>الشهر</label>
            <div class="setup-month-row">
              <select id="setup-month">
                <option value="1">يناير</option><option value="2">فبراير</option>
                <option value="3">مارس</option><option value="4">أبريل</option>
                <option value="5">مايو</option><option value="6">يونيو</option>
                <option value="7">يوليو</option><option value="8">أغسطس</option>
                <option value="9">سبتمبر</option><option value="10">أكتوبر</option>
                <option value="11">نوفمبر</option><option value="12">ديسمبر</option>
              </select>
              <select id="setup-year"></select>
            </div>
          </div>
        </div>
        <button id="start-btn" class="btn btn-primary" onclick="startCycle()">ابدأ الحساب</button>
      </div>
    </div>

    <!-- ── Cycle: active cards ─────────────────────────────────── -->
    <div id="cycle-active" style="display:none">
      <div class="cards">
        <div class="card">
          <div class="label">الراتب</div>
          <div class="value remaining" id="remaining-balance">—</div>
        </div>
        <div class="card">
          <div class="label">إجمالي المصروف</div>
          <div class="value spent" id="cycle-spent">—</div>
        </div>
        <div class="card">
          <div class="label">نسبة المصروف</div>
          <div class="value" id="spending-pct">—</div>
        </div>
        <div class="card">
          <div class="label">عدد العمليات</div>
          <div class="value count" id="tx-count">—</div>
        </div>
      </div>
      <div class="cycle-controls">
        <button class="btn btn-ghost" onclick="toggleEditBalance()">تعديل الراتب</button>
        <button class="btn btn-danger" onclick="closeCycle()">أوقف الحساب</button>
      </div>
      <div class="edit-balance-panel" id="edit-balance-panel">
        <input type="number" id="new-balance" min="0" step="0.01" placeholder="الراتب الجديد" />
        <button class="btn btn-primary" onclick="updateBalance()">حفظ</button>
        <button class="btn btn-ghost" onclick="toggleEditBalance()">إلغاء</button>
      </div>
    </div>

    <!-- ── Category bar chart (month-filtered) ────────────────── -->
    <div class="chart-wrap" style="margin-top:1.75rem">
      <div class="section-title">
        المصروف حسب الفئة — <span id="header-month-chart"></span>
      </div>
      <div id="chart"></div>
    </div>

    <!-- ── Recent transactions (month-filtered) ───────────────── -->
    <div class="section-title">آخر العمليات — <span id="header-month-table"></span></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>التاريخ</th>
            <th>التاجر / الوصف</th>
            <th>الفئة</th>
            <th>النوع</th>
            <th>المبلغ</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tx-body"></tbody>
      </table>
    </div>

    <!-- ── Cycle history ───────────────────────────────────────── -->
    <div id="cycle-history-section" style="display:none">
      <div class="section-title">سجل الدورات</div>
      <div id="cycle-history-list"></div>
    </div>

  </div>

  <script>
    // ── Constants ──────────────────────────────────────────────
    const CATEGORIES = [
      { key: 'supermarket',  label: 'سوبر ماركت' },
      { key: 'clothes',      label: 'ملابس وخياط' },
      { key: 'car',          label: 'السيارة' },
      { key: 'food',         label: 'مطاعم وتوصيل' },
      { key: 'pharmacy',     label: 'صيدلية' },
      { key: 'bnpl',         label: 'تابي وتمارا' },
      { key: 'cash',         label: 'سحب كاش' },
      { key: 'family',       label: 'تحويل للعائلة' },
      { key: 'reserve',      label: 'سحب من الرصيد الاحتياطي' },
      { key: 'visa',         label: 'تسديد الفيزا' },
      { key: 'maids',        label: 'شغالات' },
      { key: 'school',       label: 'طلبات مدرسة' },
      { key: 'laundry',      label: 'مغسلة ملابس' },
      { key: 'maintenance',  label: 'صيانة البيت' },
    ];
    const CAT_MAP = Object.fromEntries(CATEGORIES.map(c => [c.key, c.label]));

    const MONTHS_AR = [
      '','يناير','فبراير','مارس','أبريل','مايو','يونيو',
      'يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'
    ];

    // ── State ──────────────────────────────────────────────────
    let currentCycle = null;

    // ── Init ───────────────────────────────────────────────────
    const now = new Date();

    const setupMonth = document.getElementById('setup-month');
    const setupYear  = document.getElementById('setup-year');
    setupMonth.value = now.getMonth() + 1;

    for (let y = now.getFullYear(); y >= now.getFullYear() - 3; y--) {
      const o = document.createElement('option');
      o.value = y; o.textContent = y;
      setupYear.appendChild(o);
    }
    setupYear.value = now.getFullYear();

    // ── Helpers ────────────────────────────────────────────────
    const fmt = n => Number(n).toLocaleString('ar-SA', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' ر.س';

    function monthLabel(m, y) { return `${MONTHS_AR[m]} ${y}`; }

    function barColor(pct) {
      if (pct >= 100) return 'red';
      if (pct >= 75)  return 'yellow';
      return '';
    }

    // ── Cycle actions ──────────────────────────────────────────
    async function startCycle() {
      const balance = parseFloat(document.getElementById('setup-balance').value);
      const month   = parseInt(document.getElementById('setup-month').value);
      const year    = parseInt(document.getElementById('setup-year').value);

      if (!balance || balance <= 0) { alert('أدخل رصيداً صحيحاً'); return; }

      const btn = document.getElementById('start-btn');
      btn.disabled = true;
      try {
        const r = await fetch('/api/cycle/start/', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({starting_balance: balance, month, year}),
        });
        const d = await r.json();
        if (!r.ok) { alert(d.error || 'خطأ'); return; }
        loadData();
      } catch { alert('خطأ في الاتصال'); }
      finally { btn.disabled = false; }
    }

    async function closeCycle() {
      if (!confirm('أوقف الدورة الحالية وأرشفها؟ لن تتمكن من تعديلها لاحقاً.')) return;
      try {
        const r = await fetch('/api/cycle/close/', {method: 'POST'});
        const d = await r.json();
        if (!r.ok) { alert(d.error || 'خطأ'); return; }
        loadData();
      } catch { alert('خطأ في الاتصال'); }
    }

    function toggleEditBalance() {
      const panel = document.getElementById('edit-balance-panel');
      const open  = panel.style.display === 'flex';
      panel.style.display = open ? 'none' : 'flex';
      if (!open && currentCycle) {
        document.getElementById('new-balance').value = currentCycle.salary;
      }
    }

    async function updateBalance() {
      const val = parseFloat(document.getElementById('new-balance').value);
      if (!val || val <= 0) { alert('أدخل رصيداً صحيحاً'); return; }
      try {
        const r = await fetch('/api/cycle/update/', {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({salary: val}),
        });
        const d = await r.json();
        if (!r.ok) { alert(d.error || 'خطأ'); return; }
        toggleEditBalance();
        loadData();
      } catch { alert('خطأ في الاتصال'); }
    }

    // ── Helpers ────────────────────────────────────────────────
    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Skip transaction ───────────────────────────────────────
    function skipTransaction(txId, cardEl) {
      cardEl.classList.add('hiding');
      fetch(`/api/transactions/${txId}/skip/`, {method: 'POST'})
        .then(r => r.json())
        .then(() => {
          setTimeout(() => {
            cardEl.remove();
            const remaining = document.querySelectorAll('.pending-card').length;
            document.getElementById('pending-badge').textContent = remaining;
            if (remaining === 0) document.getElementById('pending-section').style.display = 'none';
          }, 300);
        })
        .catch(() => { cardEl.classList.remove('hiding'); alert('فشل التجاهل، حاول مجدداً'); });
    }

    // ── Custom category input ──────────────────────────────────
    function showCustomCategoryInput(txId, cardEl) {
      const existing = cardEl.querySelector('.custom-cat-form');
      if (existing) { existing.remove(); return; }
      const form = document.createElement('div');
      form.className = 'custom-cat-form';
      form.style.cssText = 'display:flex;gap:.4rem;margin-top:.5rem;flex-wrap:wrap;align-items:center;';
      form.innerHTML = `
        <input type="text" class="custom-cat-input"
               placeholder="اسم الفئة..."
               style="flex:1;min-width:120px;background:var(--bg);border:1px solid var(--border);border-radius:.4rem;color:var(--text);font-family:'Tajawal',sans-serif;font-size:.85rem;padding:.3rem .6rem;outline:none;" />
        <button class="cat-btn" style="background:var(--accent);color:#0f172a;border-color:var(--accent);"
                onclick="confirmCustomCategory(${txId}, this.closest('.pending-card'))">تأكيد</button>`;
      cardEl.appendChild(form);
      form.querySelector('input').focus();
    }

    function confirmCustomCategory(txId, cardEl) {
      const input = cardEl.querySelector('.custom-cat-input');
      const value = input ? input.value.trim() : '';
      if (!value) { if (input) input.focus(); return; }
      categorize(txId, value, cardEl);
    }

    // ── Pending ────────────────────────────────────────────────
    function categorize(txId, category, cardEl) {
      if (!currentCycle) {
        showNoCycleWarning();
        return;
      }
      cardEl.classList.add('hiding');
      fetch(`/api/transactions/${txId}/categorize/`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({category}),
      })
      .then(r => r.json())
      .then(data => {
        if (data.error === 'no active cycle') {
          cardEl.classList.remove('hiding');
          showNoCycleWarning();
          return;
        }
        setTimeout(() => {
          cardEl.remove();
          const remaining = document.querySelectorAll('.pending-card').length;
          document.getElementById('pending-badge').textContent = remaining;
          if (remaining === 0) document.getElementById('pending-section').style.display = 'none';
          loadData(true);
        }, 300);
      })
      .catch(() => { cardEl.classList.remove('hiding'); alert('فشل الحفظ، حاول مجدداً'); });
    }

    function showNoCycleWarning() {
      const el = document.getElementById('no-cycle-warning');
      if (el) { el.style.display = 'block'; return; }
      const warn = document.createElement('div');
      warn.id = 'no-cycle-warning';
      warn.style.cssText = 'background:var(--red-bg);border:1px solid #F1C0BB;color:var(--red);border-radius:.75rem;padding:.65rem 1rem;margin-bottom:.75rem;font-size:.9rem;';
      warn.textContent = 'يجب فتح دورة ميزانية أولاً';
      document.getElementById('pending-list').prepend(warn);
    }

    function renderPending(pending) {
      const section = document.getElementById('pending-section');
      const list    = document.getElementById('pending-list');
      const badge   = document.getElementById('pending-badge');

      if (pending.length === 0) { section.style.display = 'none'; return; }

      section.style.display = 'block';
      badge.textContent = pending.length;

      const existing = new Set(
        [...list.querySelectorAll('.pending-card')].map(el => el.dataset.id)
      );

      pending.forEach(tx => {
        if (existing.has(String(tx.id))) return;

        const isDebit    = tx.type === 'debit';
        const amountStr  = tx.amount > 0
          ? `${isDebit ? '−' : '+'} ${fmt(tx.amount)}`
          : 'غير معروف';
        const amountColor = isDebit ? 'var(--red)' : 'var(--green)';

        const noCycle   = !currentCycle;
        const disabledStyle = noCycle ? 'opacity:.4;cursor:not-allowed;pointer-events:none;' : '';
        const btns = CATEGORIES.map(c =>
          `<button class="cat-btn" style="${disabledStyle}" onclick="categorize(${tx.id},'${c.key}',this.closest('.pending-card'))">${c.label}</button>`
        ).join('') +
          `<button class="cat-btn" style="border-color:#475569;color:var(--muted);${disabledStyle}"
                   onclick="showCustomCategoryInput(${tx.id},this.closest('.pending-card'))">إدخال يدوي</button>`;

        const card = document.createElement('div');
        card.className  = 'pending-card';
        card.dataset.id = tx.id;
        card.innerHTML  = `
          <div class="pending-meta">
            <span class="pending-amount" style="color:${amountColor}">${amountStr}</span>
            <span class="pending-date">${tx.date || '—'}</span>
          </div>
          <pre class="pending-raw">${escapeHtml(tx.raw_sms || '')}</pre>
          <div class="cat-buttons">${btns}</div>
          <button class="btn-skip" onclick="skipTransaction(${tx.id}, this.closest('.pending-card'))">تجاهل</button>`;
        list.appendChild(card);
      });
    }

    // ── Cycle render ───────────────────────────────────────────
    function renderCycle(cycle) {
      currentCycle = cycle;
      const setup  = document.getElementById('cycle-setup');
      const active = document.getElementById('cycle-active');

      if (cycle) {
        setup.style.display  = 'none';
        active.style.display = 'block';
        document.getElementById('remaining-balance').textContent = fmt(cycle.salary);
        document.getElementById('cycle-spent').textContent       = fmt(cycle.total_expenses);
        document.getElementById('tx-count').textContent          = cycle.tx_count;
        const pctEl = document.getElementById('spending-pct');
        if (cycle.spending_percentage === null) {
          pctEl.textContent = '—';
          pctEl.className   = 'value';
        } else {
          pctEl.textContent = cycle.spending_percentage.toLocaleString('ar-SA') + '٪ (' + fmt(cycle.total_expenses) + ')';
          const p = cycle.spending_percentage;
          pctEl.className = 'value ' + (p > 90 ? 'spent' : p >= 70 ? 'pct-yellow' : 'pct-green');
        }
      } else {
        setup.style.display  = 'block';
        active.style.display = 'none';
        document.getElementById('edit-balance-panel').style.display = 'none';
      }
    }

    // ── Cycle history render ───────────────────────────────────
    let expandedCycleId = null;

    function toggleCycleBreakdown(cycleId) {
      const panel = document.getElementById(`breakdown-${cycleId}`);
      const row   = document.getElementById(`history-row-${cycleId}`);
      const icon  = document.getElementById(`expand-icon-${cycleId}`);
      if (!panel) return;

      if (expandedCycleId === cycleId) {
        panel.style.display = 'none';
        row.classList.remove('open');
        icon.style.transform = '';
        expandedCycleId = null;
        return;
      }
      if (expandedCycleId !== null) {
        const prev     = document.getElementById(`breakdown-${expandedCycleId}`);
        const prevRow  = document.getElementById(`history-row-${expandedCycleId}`);
        const prevIcon = document.getElementById(`expand-icon-${expandedCycleId}`);
        if (prev)     prev.style.display = 'none';
        if (prevRow)  prevRow.classList.remove('open');
        if (prevIcon) prevIcon.style.transform = '';
      }
      panel.style.display = 'block';
      row.classList.add('open');
      icon.style.transform = 'rotate(180deg)';
      expandedCycleId = cycleId;
    }

    function renderCycleHistory(cycles) {
      const section = document.getElementById('cycle-history-section');
      const list    = document.getElementById('cycle-history-list');
      if (cycles.length === 0) { section.style.display = 'none'; return; }

      section.style.display = 'block';
      list.innerHTML = '';
      expandedCycleId = null;
      cycles.forEach(c => {
        const spent = c.total_spent !== null ? fmt(c.total_spent) : '—';
        let pctHtml = '';
        if (c.spending_percentage !== null) {
          const p     = c.spending_percentage;
          const color = p > 90 ? 'var(--red)' : p >= 70 ? 'var(--yellow)' : 'var(--green)';
          pctHtml = `<span style="color:${color};font-weight:700">${p.toLocaleString('ar-SA')}٪ (${fmt(c.total_spent)})</span>`;
        }
        const breakdownRows = c.by_category.length
          ? c.by_category.map(r =>
              `<div class="breakdown-row">
                <span class="breakdown-cat">${CAT_MAP[r.category] || r.category}</span>
                <span class="breakdown-amount">${fmt(r.total)}</span>
              </div>`).join('')
          : `<span style="color:var(--muted);font-size:.85rem">لا توجد مصروفات</span>`;

        list.innerHTML += `
          <div class="history-item">
            <div class="history-row" id="history-row-${c.id}" onclick="toggleCycleBreakdown(${c.id})">
              <span class="history-month">${monthLabel(c.month, c.year)}</span>
              <div class="history-stats">
                <span>الراتب: ${fmt(c.salary)}</span>
                <span class="neg">مصروف: ${spent}</span>
                ${pctHtml}
              </div>
              <span class="expand-icon" id="expand-icon-${c.id}">▾</span>
            </div>
            <div class="cycle-breakdown" id="breakdown-${c.id}" style="display:none">
              ${breakdownRows}
            </div>
          </div>`;
      });
    }

    // ── Main render ────────────────────────────────────────────
    function render(data) {
      const ml = monthLabel(data.month, data.year);
      document.getElementById('header-month-chart').textContent = ml;
      document.getElementById('header-month-table').textContent = ml;
      document.getElementById('last-update').textContent = new Date().toLocaleTimeString('ar-SA');

      renderCycle(data.active_cycle);
      renderPending(data.pending);

      // Bar chart — month-filtered categories
      const chart = document.getElementById('chart');
      chart.innerHTML = '';
      if (data.by_category.length === 0) {
        chart.innerHTML = '<p style="color:var(--muted);font-size:.9rem">لا توجد مصروفات مصنّفة هذا الشهر</p>';
      } else {
        const maxTotal = Math.max(...data.by_category.map(r => r.total));
        data.by_category.forEach(row => {
          const label    = CAT_MAP[row.category] || row.category;
          const pct      = maxTotal > 0 ? (row.total / maxTotal) * 100 : 0;
          const limit    = data.budgets[row.category];
          const color    = limit ? barColor((row.total / limit) * 100) : '';
          chart.innerHTML += `
            <div class="bar-row">
              <div class="bar-label" title="${label}">${label}</div>
              <div class="bar-track"><div class="bar-fill ${color}" style="width:${pct}%"></div></div>
              <div class="bar-amount">${fmt(row.total)}</div>
            </div>`;
        });
      }

      // Recent table — month-filtered
      const tbody = document.getElementById('tx-body');
      tbody.innerHTML = '';
      if (data.recent.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:2rem">لا توجد عمليات</td></tr>`;
      } else {
        data.recent.forEach(t => {
          const catLabel  = CAT_MAP[t.category] || t.category;
          const typeLabel = t.type === 'debit' ? 'خصم' : 'إيداع';
          const sign      = t.type === 'debit' ? '−' : '+';
          const tr = document.createElement('tr');
          tr.dataset.id = t.id;
          tr.innerHTML = `
              <td style="color:var(--muted)">${t.date || t.created_at}</td>
              <td>${t.merchant || '—'}</td>
              <td><span class="badge cat-${t.category}">${catLabel}</span></td>
              <td class="${t.type === 'debit' ? 'type-debit' : 'type-credit'}">${typeLabel}</td>
              <td style="font-weight:700;color:${t.type==='debit'?'var(--red)':'var(--green)'}">${sign} ${fmt(t.amount)}</td>
              <td><button class="btn-delete" onclick="deleteTransaction(${t.id}, this.closest('tr'))">✕</button></td>`;
          tbody.appendChild(tr);
        });
      }

      renderCycleHistory(data.cycle_history);

      document.getElementById('loader').style.display  = 'none';
      document.getElementById('content').style.display = 'block';
    }

    // ── Delete transaction ─────────────────────────────────────
    async function deleteTransaction(txId, rowEl) {
      if (!confirm('حذف هذه العملية؟')) return;
      rowEl.classList.add('removing');
      try {
        const r = await fetch(`/api/transactions/${txId}/`, {method: 'DELETE'});
        const d = await r.json();
        if (!r.ok) { rowEl.classList.remove('removing'); alert(d.error || 'خطأ في الحذف'); return; }
        setTimeout(() => { rowEl.remove(); loadData(true); }, 250);
      } catch {
        rowEl.classList.remove('removing');
        alert('خطأ في الاتصال');
      }
    }

    // ── Fetch ──────────────────────────────────────────────────
    function loadData(keepPendingCards = false) {
      if (!keepPendingCards) {
        document.getElementById('pending-list').innerHTML = '';
      }

      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      fetch('/api/dashboard/')
        .then(r => { if (r.status === 401) { window.location.href = '/login/'; return; } if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
        .then(render)
        .catch(err => {
          errEl.textContent = `خطأ في تحميل البيانات: ${err.message}`;
          errEl.style.display = 'block';
          document.getElementById('loader').style.display = 'none';
        });
    }

    // ── Auto-refresh every 30s ─────────────────────────────────
    loadData();
    setInterval(() => loadData(true), 30000);
  </script>
</body>
</html>
