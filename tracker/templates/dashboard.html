<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مراقب الميزانية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f172a;
      --card:    #1e293b;
      --border:  #334155;
      --accent:  #38bdf8;
      --text:    #f1f5f9;
      --muted:   #94a3b8;
      --green:   #22c55e;
      --yellow:  #eab308;
      --red:     #ef4444;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1rem;
    }

    /* ── Header ──────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .75rem;
      margin-bottom: 1.5rem;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .header-meta { font-size: .85rem; color: var(--muted); text-align: left; }

    /* ── Month picker ─────────────────────────────────────────── */
    .month-picker {
      display: flex;
      align-items: center;
      gap: .5rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: .75rem;
      padding: .5rem .9rem;
    }
    .month-picker select, .month-picker button {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'Tajawal', sans-serif;
      font-size: .95rem;
      cursor: pointer;
      outline: none;
    }
    .month-picker select option { background: var(--card); }
    .month-picker button {
      background: var(--accent);
      color: #0f172a;
      border-radius: .5rem;
      padding: .25rem .75rem;
      font-weight: 700;
    }
    .month-picker button:hover { opacity: .85; }

    /* ── Pending section ──────────────────────────────────────── */
    #pending-section { margin-bottom: 1.75rem; }
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: .75rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .pending-badge {
      display: inline-block;
      background: var(--red);
      color: #fff;
      border-radius: 99px;
      font-size: .7rem;
      font-weight: 700;
      padding: .1rem .45rem;
      margin-right: .4rem;
      vertical-align: middle;
    }

    .pending-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1rem 1.2rem;
      margin-bottom: .75rem;
      transition: opacity .3s, transform .3s;
    }
    .pending-card.hiding {
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
    }
    .pending-card-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: .6rem;
    }
    .pending-merchant { font-size: 1rem; font-weight: 700; }
    .pending-amount   { font-size: 1.15rem; font-weight: 700; color: var(--red); }
    .pending-date     { font-size: .8rem; color: var(--muted); margin-bottom: .75rem; }

    .cat-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
    }
    .cat-btn {
      background: #1e3a5f;
      border: 1px solid #2563eb44;
      color: var(--text);
      border-radius: .5rem;
      padding: .3rem .65rem;
      font-family: 'Tajawal', sans-serif;
      font-size: .82rem;
      cursor: pointer;
      transition: background .15s, border-color .15s;
      white-space: nowrap;
    }
    .cat-btn:hover  { background: #2563eb; border-color: #2563eb; }
    .cat-btn:active { background: #1d4ed8; }

    /* ── Summary cards ────────────────────────────────────────── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.2rem 1.4rem;
    }
    .card .label { font-size: .8rem; color: var(--muted); margin-bottom: .4rem; }
    .card .value { font-size: 1.6rem; font-weight: 700; }
    .card .value.spent  { color: var(--red); }
    .card .value.income { color: var(--green); }
    .card .value.bal    { color: var(--accent); }
    .card .value.count  { color: var(--yellow); }

    /* ── Bar chart ────────────────────────────────────────────── */
    .chart-wrap { margin-bottom: 1.75rem; }
    .bar-row {
      display: grid;
      grid-template-columns: 130px 1fr 90px;
      align-items: center;
      gap: .75rem;
      margin-bottom: .6rem;
    }
    .bar-label  { font-size: .85rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track  { background: var(--border); border-radius: 99px; height: 10px; overflow: hidden; }
    .bar-fill   { height: 100%; border-radius: 99px; transition: width .5s ease; background: var(--green); }
    .bar-fill.yellow { background: var(--yellow); }
    .bar-fill.red    { background: var(--red); }
    .bar-amount { font-size: .85rem; color: var(--muted); text-align: left; }

    /* ── Table ────────────────────────────────────────────────── */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    thead th {
      background: #0f172a;
      padding: .75rem 1rem;
      text-align: right;
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
    }
    tbody tr { border-top: 1px solid var(--border); }
    tbody tr:hover { background: rgba(56,189,248,.04); }
    tbody td { padding: .7rem 1rem; white-space: nowrap; }
    .badge {
      display: inline-block;
      padding: .15rem .6rem;
      border-radius: .4rem;
      font-size: .78rem;
      font-weight: 500;
    }
    .type-debit  { color: var(--red); }
    .type-credit { color: var(--green); }

    .cat-supermarket { background:#064e3b33; color:#6ee7b7; }
    .cat-clothes     { background:#4a1d9633; color:#c4b5fd; }
    .cat-car         { background:#78350f33; color:#fcd34d; }
    .cat-food        { background:#7f1d1d33; color:#fca5a5; }
    .cat-pharmacy    { background:#14532d33; color:#86efac; }
    .cat-bnpl        { background:#83184333; color:#f9a8d4; }
    .cat-cash        { background:#1c1917;   color:#a8a29e; }
    .cat-family      { background:#1e1b4b33; color:#a5b4fc; }
    .cat-reserve     { background:#0c4a6e33; color:#7dd3fc; }
    .cat-visa        { background:#14532d33; color:#34d399; }
    .cat-other       { background:#1e293b;   color:#94a3b8; }

    /* ── Loader / error ───────────────────────────────────────── */
    #loader { text-align: center; padding: 3rem; color: var(--muted); font-size: 1.1rem; }
    #error-msg {
      display: none;
      background: #7f1d1d44;
      border: 1px solid var(--red);
      color: #fca5a5;
      border-radius: .75rem;
      padding: .75rem 1rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 480px) {
      .bar-row { grid-template-columns: 100px 1fr 70px; }
      .card .value { font-size: 1.3rem; }
      .cat-btn { font-size: .78rem; padding: .25rem .5rem; }
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>مراقب الميزانية</h1>
      <div class="header-meta">
        <span id="header-month"></span>
        &nbsp;|&nbsp;
        آخر تحديث: <span id="last-update">—</span>
      </div>
    </div>
    <div class="month-picker">
      <select id="sel-month">
        <option value="1">يناير</option><option value="2">فبراير</option>
        <option value="3">مارس</option><option value="4">أبريل</option>
        <option value="5">مايو</option><option value="6">يونيو</option>
        <option value="7">يوليو</option><option value="8">أغسطس</option>
        <option value="9">سبتمبر</option><option value="10">أكتوبر</option>
        <option value="11">نوفمبر</option><option value="12">ديسمبر</option>
      </select>
      <select id="sel-year"></select>
      <button onclick="loadData()">عرض</button>
    </div>
  </header>

  <div id="error-msg"></div>
  <div id="loader">جاري التحميل…</div>
  <div id="content" style="display:none">

    <!-- Pending categorization -->
    <div id="pending-section" style="display:none">
      <div class="section-title">
        <span class="pending-badge" id="pending-badge">0</span>
        بانتظار التصنيف
      </div>
      <div id="pending-list"></div>
    </div>

    <!-- Summary cards -->
    <div class="cards">
      <div class="card">
        <div class="label">إجمالي المصروف</div>
        <div class="value spent" id="total-spent">—</div>
      </div>
      <div class="card">
        <div class="label">إجمالي الدخل</div>
        <div class="value income" id="total-income">—</div>
      </div>
      <div class="card">
        <div class="label">الرصيد الحالي</div>
        <div class="value bal" id="balance">—</div>
      </div>
      <div class="card">
        <div class="label">عدد العمليات</div>
        <div class="value count" id="tx-count">—</div>
      </div>
    </div>

    <!-- Category bar chart -->
    <div class="chart-wrap">
      <div class="section-title">المصروف حسب الفئة</div>
      <div id="chart"></div>
    </div>

    <!-- Recent transactions -->
    <div class="section-title">آخر العمليات</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>التاريخ</th>
            <th>التاجر / الوصف</th>
            <th>الفئة</th>
            <th>النوع</th>
            <th>المبلغ</th>
            <th>الرصيد</th>
          </tr>
        </thead>
        <tbody id="tx-body"></tbody>
      </table>
    </div>

  </div>

  <script>
    // ── Category definitions ───────────────────────────────────
    const CATEGORIES = [
      { key: 'supermarket', label: 'سوبر ماركت' },
      { key: 'clothes',     label: 'ملابس وخياط' },
      { key: 'car',         label: 'السيارة' },
      { key: 'food',        label: 'مطاعم وتوصيل' },
      { key: 'pharmacy',    label: 'صيدلية' },
      { key: 'bnpl',        label: 'تابي وتمارا' },
      { key: 'cash',        label: 'سحب كاش' },
      { key: 'family',      label: 'تحويل للعائلة' },
      { key: 'reserve',     label: 'سحب من الرصيد الاحتياطي' },
      { key: 'visa',        label: 'تسديد الفيزا' },
      { key: 'other',       label: 'أخرى' },
    ];
    const CAT_MAP = Object.fromEntries(CATEGORIES.map(c => [c.key, c.label]));

    const MONTHS_AR = [
      '','يناير','فبراير','مارس','أبريل','مايو','يونيو',
      'يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'
    ];

    // ── Init selectors ─────────────────────────────────────────
    const now = new Date();
    let currentMonth = now.getMonth() + 1;
    let currentYear  = now.getFullYear();

    const selMonth = document.getElementById('sel-month');
    const selYear  = document.getElementById('sel-year');
    selMonth.value = currentMonth;
    for (let y = currentYear; y >= currentYear - 3; y--) {
      const o = document.createElement('option');
      o.value = y; o.textContent = y;
      selYear.appendChild(o);
    }
    selYear.value = currentYear;

    // ── Helpers ────────────────────────────────────────────────
    const fmt = n => Number(n).toLocaleString('ar-SA', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' ر.س';

    function barColor(pct) {
      if (pct >= 100) return 'red';
      if (pct >= 75)  return 'yellow';
      return '';
    }

    // ── Categorize action ──────────────────────────────────────
    function categorize(txId, category, cardEl) {
      cardEl.classList.add('hiding');
      fetch(`/api/transactions/${txId}/categorize/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ category }),
      })
      .then(r => r.json())
      .then(() => {
        setTimeout(() => {
          cardEl.remove();
          // Update badge count
          const remaining = document.querySelectorAll('.pending-card').length;
          document.getElementById('pending-badge').textContent = remaining;
          if (remaining === 0) {
            document.getElementById('pending-section').style.display = 'none';
          }
          // Reload summary data to update totals
          loadData(true);
        }, 300);
      })
      .catch(() => {
        cardEl.classList.remove('hiding');
        alert('فشل الحفظ، حاول مجدداً');
      });
    }

    // ── Render pending cards ───────────────────────────────────
    function renderPending(pending) {
      const section = document.getElementById('pending-section');
      const list    = document.getElementById('pending-list');
      const badge   = document.getElementById('pending-badge');

      if (pending.length === 0) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';
      badge.textContent = pending.length;

      // Only add cards that aren't already rendered
      const existing = new Set(
        [...list.querySelectorAll('.pending-card')].map(el => el.dataset.id)
      );

      pending.forEach(tx => {
        if (existing.has(String(tx.id))) return;

        const btns = CATEGORIES.map(c =>
          `<button class="cat-btn" onclick="categorize(${tx.id},'${c.key}',this.closest('.pending-card'))">${c.label}</button>`
        ).join('');

        const card = document.createElement('div');
        card.className   = 'pending-card';
        card.dataset.id  = tx.id;
        card.innerHTML   = `
          <div class="pending-card-top">
            <span class="pending-merchant">${tx.merchant}</span>
            <span class="pending-amount">− ${fmt(tx.amount)}</span>
          </div>
          <div class="pending-date">${tx.date || '—'}</div>
          <div class="cat-buttons">${btns}</div>`;
        list.appendChild(card);
      });
    }

    // ── Render main dashboard ──────────────────────────────────
    function render(data) {
      document.getElementById('header-month').textContent =
        `${MONTHS_AR[data.month]} ${data.year}`;
      document.getElementById('last-update').textContent =
        new Date().toLocaleTimeString('ar-SA');

      document.getElementById('total-spent').textContent  = fmt(data.total_spent);
      document.getElementById('total-income').textContent = fmt(data.total_income);
      document.getElementById('balance').textContent      = fmt(data.balance_latest);
      document.getElementById('tx-count').textContent     = data.recent.length;

      // Bar chart — width relative to largest category
      const chart   = document.getElementById('chart');
      chart.innerHTML = '';
      if (data.by_category.length === 0) {
        chart.innerHTML = '<p style="color:var(--muted);font-size:.9rem">لا توجد مصروفات مصنّفة هذا الشهر</p>';
      } else {
        const maxTotal = Math.max(...data.by_category.map(r => r.total));
        data.by_category.forEach(row => {
          const label  = CAT_MAP[row.category] || row.category;
          const pct    = maxTotal > 0 ? (row.total / maxTotal) * 100 : 0;
          // Check budget limit if available
          const limit  = data.budgets[row.category];
          const budgetPct = limit ? (row.total / limit) * 100 : 0;
          const color  = limit ? barColor(budgetPct) : '';
          chart.innerHTML += `
            <div class="bar-row">
              <div class="bar-label" title="${label}">${label}</div>
              <div class="bar-track">
                <div class="bar-fill ${color}" style="width:${pct}%"></div>
              </div>
              <div class="bar-amount">${fmt(row.total)}</div>
            </div>`;
        });
      }

      // Recent transactions table
      const tbody = document.getElementById('tx-body');
      tbody.innerHTML = '';
      if (data.recent.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:2rem">لا توجد عمليات</td></tr>`;
      } else {
        data.recent.forEach(t => {
          const catLabel  = CAT_MAP[t.category] || t.category;
          const typeLabel = t.type === 'debit' ? 'خصم' : 'إيداع';
          const typeClass = t.type === 'debit' ? 'type-debit' : 'type-credit';
          const sign      = t.type === 'debit' ? '−' : '+';
          tbody.innerHTML += `
            <tr>
              <td style="color:var(--muted)">${t.date || t.created_at}</td>
              <td>${t.merchant || '—'}</td>
              <td><span class="badge cat-${t.category}">${catLabel}</span></td>
              <td class="${typeClass}">${typeLabel}</td>
              <td style="font-weight:700;color:${t.type==='debit'?'var(--red)':'var(--green)'}">${sign} ${fmt(t.amount)}</td>
              <td style="color:var(--muted)">${t.balance != null ? fmt(t.balance) : '—'}</td>
            </tr>`;
        });
      }

      document.getElementById('loader').style.display  = 'none';
      document.getElementById('content').style.display = 'block';

      renderPending(data.pending);
    }

    // ── Fetch ──────────────────────────────────────────────────
    function loadData(keepPendingCards = false) {
      const month = selMonth.value;
      const year  = selYear.value;
      currentMonth = +month;
      currentYear  = +year;

      if (!keepPendingCards) {
        document.getElementById('pending-list').innerHTML = '';
      }

      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      fetch(`/api/dashboard/?month=${month}&year=${year}`)
        .then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.json();
        })
        .then(render)
        .catch(err => {
          errEl.textContent = `خطأ في تحميل البيانات: ${err.message}`;
          errEl.style.display = 'block';
          document.getElementById('loader').style.display = 'none';
        });
    }

    // ── Auto-refresh every 30s ─────────────────────────────────
    loadData();
    setInterval(() => loadData(true), 30000);
  </script>
</body>
</html>
